name: Quality

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: itguardian_test
          POSTGRES_USER: itguardian
          POSTGRES_PASSWORD: itguardian
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U itguardian -d itguardian_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      NODE_ENV: test
      DATABASE_URL: memory
      TEST_DATABASE_URL: postgres://itguardian:itguardian@127.0.0.1:5432/itguardian_test
      JWT_SECRET: ci-only-secret-with-at-least-32-characters
      ENABLE_DEMO_SEED: "false"

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run check:architecture
      - run: npm run test:coverage
      - run: npm run test:integration
      - run: npm run build
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e
