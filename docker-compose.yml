services:
  db:
    image: postgres:16-alpine
    container_name: it-guardian-db
    environment:
      POSTGRES_DB: itguardian
      POSTGRES_USER: itguardian
      POSTGRES_PASSWORD: itguardian
    ports:
      - "5432:5432"
    volumes:
      - it_guardian_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U itguardian -d itguardian"]
      interval: 5s
      timeout: 5s
      retries: 10

  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    container_name: it-guardian-api
    environment:
      PORT: 4000
      JWT_SECRET: change-me-in-production
      JWT_EXPIRES_IN: 8h
      CLIENT_ORIGIN: http://localhost:5173
      DATABASE_URL: postgres://itguardian:itguardian@db:5432/itguardian
      STREAM_INTERVAL_MS: 10000
    ports:
      - "4000:4000"
    depends_on:
      db:
        condition: service_healthy

  client:
    build:
      context: .
      dockerfile: client/Dockerfile
      args:
        VITE_API_URL: http://localhost:4000/api
        VITE_WS_URL: ws://localhost:4000/ws
    container_name: it-guardian-web
    ports:
      - "5173:80"
    depends_on:
      - server

volumes:
  it_guardian_pgdata:
